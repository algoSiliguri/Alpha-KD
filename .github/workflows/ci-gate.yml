name: CI Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Check wildcard imports and unused imports
        run: |
          ruff check src/alpha_kd/ tests/ --select E,W,F
      - name: Explicitly reject import *
        run: |
          if grep -r "from .* import \*" src/alpha_kd/ tests/; then
            echo "ERROR: Wildcard imports found."
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit
        run: bandit -r src/alpha_kd/ -f json -o bandit-report.json || true
      - name: Fail on high-severity issues
        run: |
          if [ -s bandit-report.json ]; then
            high=$(jq '[.results[] | select(.issue_severity == "HIGH")] | length' bandit-report.json)
            if [ "$high" -gt 0 ]; then
              echo "ERROR: $high high-severity security issues found."
              jq '.results[] | select(.issue_severity == "HIGH")' bandit-report.json
              exit 1
            fi
          fi
