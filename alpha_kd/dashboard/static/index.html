<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-KD Portfolio Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="background-decor"></div>
    <div class="dashboard-container">
        <header>
            <div class="brand">
                <h1>Alpha-KD <span>Portfolio</span></h1>
                <div id="status-indicator" class="status-indicator">
                    <span class="pulse"></span> <span id="status-text">LIVE MONITOR</span>
                </div>
            </div>
            <div class="control-panel glass">
                <select id="mode-select">
                    <option value="Historical Backtest">Historical Backtest</option>
                    <option value="Forward Test (Simulated Live)">Forward Test</option>
                    <option value="Paper Trading (Real-Time Live)">Paper Trading</option>
                </select>
                <div class="control-buttons">
                    <button id="btn-start" class="btn">Start</button>
                    <button id="btn-pause" class="btn">Pause</button>
                    <button id="btn-halt" class="btn btn-danger">FORCE HALT</button>
                </div>
            </div>
        </header>

        <main class="grid-layout">
            <section class="card glass">
                <h2>Drawdown Tracker</h2>
                <div class="metric-group">
                    <div class="metric"><span class="label">Aggregate Equity</span><span id="agg-equity" class="value">-</span></div>
                    <div class="metric"><span class="label">Current DD</span><span id="current-drawdown" class="value">0.00%</span></div>
                    <div class="metric"><span class="label">Breaker Status</span><span id="breaker-status" class="value status-ok">ACTIVE</span></div>
                </div>
            </section>

            <section class="card glass col-span-full">
                <h2>Assets Monitor</h2>
                <div id="ticker-cards" class="ticker-grid"></div>
            </section>

            <section class="card glass col-span-full">
                <h2>Aggregate Equity Curve</h2>
                <div class="chart-container">
                    <canvas id="equity-chart" height="100"></canvas>
                </div>
            </section>

            <section class="card glass col-span-full">
                <h2>Live Telemetry Terminal View</h2>
                <div id="terminal" class="terminal-view">
                    <div class="terminal-line system-msg">Initializing connections...</div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
